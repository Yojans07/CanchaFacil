<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Administrador - CanchaFácil</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tu archivo CSS personalizado -->
    <link rel="stylesheet" type="text/css" href="../css/inicioadmi.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <!-- Tarjeta de Login Administrador (Mismo estilo unificado) -->
    <div class="admin-card p-4 text-center shadow-lg">
        
        <!-- Logo Corporativo -->
        <img src="../imagenes/logo-green.png" alt="Logo Cancha-Facil" class="mb-3 img-fluid" width="90" height="90">
        
        <h1 class="h3 mb-4 fw-bold text-white">Inicio Administrador</h1> 
        
        <form>
            <!-- Campo Nombre Administrador -->
            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Nombre Administrador</label>
                <input type="text" class="form-control custom-input" placeholder="xxxxxxx">
            </div>
            
            <!-- Campo Contraseña -->
            <div class="mb-4 text-start">
                <label class="form-label text-white fw-semibold">Contraseña</label>
                <input type="password" class="form-control custom-input" placeholder="********">
            </div>
            
            <!-- Botón de Ingreso (Texto Navy sobre fondo Verde Intenso) -->
            <a href="admi.html" class="btn btn-custom w-100 rounded-pill fw-bold mb-3 py-2">Iniciar</a>
        </form>
        
        <!-- Enlace de Retorno -->
        <div class="mt-3">
            <a href="login.html" class="text-decoration-none back-link">Volver</a>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
