<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Ingresos - CanchaFácil</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu archivo CSS personalizado -->
    <link rel="stylesheet" href="../css/ingresoadmi.css">
</head>

<body class="bg-dark text-white">

    <!-- HEADER (Combinación: Azul Navy sobre barra Verde Intenso) -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow bg-dark">
        <div class="container">
            <img src="../img/logo-green.png" style="height: 90px;" alt="">
            <a class="navbar-brand fw-bold ms-2" href="#" style="font-size: 2rem; color: white;">
                Cancha<span style="color:  #62ff00;">Facil </span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="admi.html" class="btn btn-inicio-navy rounded-pill fw-bold">Inicio</a>    
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="container my-5">
        <h1 class="text-white mb-4 fw-bold text-center text-md-start">Historial de Ingresos</h1>

        <div class="row g-4">
            <!-- SECCIÓN DEL GRÁFICO (Izquierda) -->
            <div class="col-12 col-lg-8">
                <div
                    class="cuadro-grafico p-4 rounded-4 shadow-sm d-flex justify-content-center align-items-center h-100">
                    <img src="../imagenes/Gemini_Generated_Image_etcwueetcwueetcw.png" alt="Gráfico de barras"
                        class="img-fluid rounded-3 shadow">
                </div>
            </div>

            <!-- LISTADO DE MESES (Derecha) -->
            <div class="col-12 col-lg-4">
                <div class="listado-meses d-flex flex-column gap-2 pe-1">

                    <!-- Mes Actual Destacado -->
                    <div class="tarjeta-mes p-3 shadow-sm rounded-4">
                        <span class="badge text-bg-verde mb-2 fw-bold">MES ACTUAL</span>
                        <p class="monto-ingreso text-white m-0">$ 5'400.000</p>
                    </div>

                    <!-- Agosto -->
                    <div class="tarjeta-mes p-3 shadow-sm rounded-4">
                        <p class="etiqueta-mes text-white-50 small m-0 fw-bold mb-1">AGOSTO</p>
                        <p class="monto-ingreso text-white m-0">$ 4'400.000</p>
                    </div>

                    <!-- Julio -->
                    <div class="tarjeta-mes p-3 shadow-sm rounded-4">
                        <p class="etiqueta-mes text-white-50 small m-0 fw-bold mb-1">JULIO</p>
                        <p class="monto-ingreso text-white m-0">$ 6'900.000</p>
                    </div>

                    <!-- Junio -->
                    <div class="tarjeta-mes p-3 shadow-sm rounded-4">
                        <p class="etiqueta-mes text-white-50 small m-0 fw-bold mb-1">JUNIO</p>
                        <p class="monto-ingreso text-white m-0">$ 5'100.000</p>
                    </div>

                    <!-- Mayo -->
                    <div class="tarjeta-mes p-3 shadow-sm rounded-4">
                        <p class="etiqueta-mes text-white-50 small m-0 fw-bold mb-1">MAYO</p>
                        <p class="monto-ingreso text-white m-0">$ 10'500.000</p>
                    </div>

                    <!-- Abril -->
                    <div class="tarjeta-mes p-3 shadow-sm rounded-4">
                        <p class="etiqueta-mes text-white-50 small m-0 fw-bold mb-1">ABRIL</p>
                        <p class="monto-ingreso text-white m-0">$ 7'200.000</p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
