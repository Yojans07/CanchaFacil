<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="../css/login.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="login-card p-4 text-center shadow-lg">
        
        <img src="../img/logo-green.png" alt="Logo Cancha-Facil" class="mb-3 img-fluid" width="90" height="90">
        
        <h1 class="h3 mb-4 fw-bold text-white">Iniciar Sesión</h1> 
        
        <form>
            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Nombre de Usuario</label>
                <input type="text" class="form-control custom-input" placeholder="xxxxxxx">
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label text-white fw-semibold">Contraseña</label>
                <input type="password" class="form-control custom-input" placeholder="********">
            </div>
            
            <a href="../index.html" class="btn btn-custom w-100 rounded-pill fw-bold mb-3 py-2">Iniciar Sesión</a>
        </form>
        
        <div class="login-links d-flex flex-column gap-2 mt-3">
            <a href="../html/registro.html" class="text-decoration-none secondary-link">¿No tienes cuenta?</a>
            <a href="../html/inicioadmi.html" class="text-decoration-none secondary-link fw-semibold">Inicio Administrador</a>
            <a href="../index.html" class="text-decoration-none back-link mt-2">Volver</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
