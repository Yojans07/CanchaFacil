<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - CanchaFácil</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="../css/registro.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="register-card p-4 text-center shadow-lg">
        
        <img src="../img/logo-green.png" alt="Logo Cancha-Facil" class="mb-2 img-fluid" width="90" height="90">
        
        <h1 class="h3 mb-4 fw-bold text-white">Registro</h1> 
        
        <form>
            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Nombre</label>
                <input type="text" class="form-control custom-input" placeholder="Daniel">
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Apellido</label>
                <input type="text" class="form-control custom-input" placeholder="Medina">
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Correo electrónico</label>
                <input type="email" class="form-control custom-input" placeholder="correo@ejemplo.com">
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Número de contacto</label>
                <input type="number" class="form-control custom-input" placeholder="3001234567">
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-white fw-semibold">Contraseña</label>
                <input type="password" class="form-control custom-input" placeholder="********">
            </div>

            <div class="mb-4 text-start">
                <label class="form-label text-white fw-semibold">Confirmar Contraseña</label>
                <input type="password" class="form-control custom-input" placeholder="********">
            </div>
            
            <a href="../index.html" class="btn btn-custom w-100 rounded-pill fw-bold mb-3 py-2">Registrarse</a>
        </form>
        
        <div class="mt-2">
            <a href="../html/login.html" class="text-decoration-none secondary-link">¿Ya tienes cuenta? Inicia Sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</html>
